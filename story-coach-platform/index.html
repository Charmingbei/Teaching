<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>低年級國語說故事陪伴教練</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Grade 1-2 Story Coach</p>
          <h1>低年級國語說故事陪伴教練</h1>
        </div>
      </header>

      <section class="workspace">
        <section class="practice-panel" aria-label="練習錄影">
          <div class="video-frame">
            <video id="camera" autoplay muted playsinline></video>
            <div class="camera-overlay">
              <p id="camera-status">尚未開啟鏡頭</p>
            </div>
          </div>

          <div class="control-row">
            <button id="camera-btn" class="primary-btn" type="button">開啟鏡頭</button>
            <button id="record-btn" class="danger-btn" type="button" disabled>開始練習</button>
            <button id="finish-btn" type="button" disabled>完成分析</button>
            <div class="timer" id="timer">00:00</div>
          </div>

          <section class="upload-box" aria-label="上傳影片分析">
            <div class="field">
              <label for="video-upload">上傳影片分析</label>
              <input id="video-upload" type="file" accept="video/*" />
            </div>
            <button id="analyze-upload-btn" type="button" disabled>分析上傳影片</button>
            <p id="upload-status">可上傳練習影片，依鏡頭展現產生建議。</p>
          </section>

          <div class="story-box">
            <div class="field">
              <label for="student-name">練習者</label>
              <input id="student-name" type="text" value="小小故事家" />
            </div>
          </div>

          <section class="rubric-settings" aria-label="正式評分設定">
            <h2>正式評分設定</h2>
            <div class="setting-grid">
              <div class="field">
                <label for="voice-score">語音：聲、韻、調（60%）</label>
                <input id="voice-score" type="number" min="0" max="60" value="45" />
              </div>
              <div class="field">
                <label for="content-score">內容：思想、結構（30%）</label>
                <input id="content-score" type="number" min="0" max="30" value="22" />
              </div>
              <div class="field">
                <label for="manner-score">儀態：動作、表情（10%）</label>
                <input id="manner-score" type="number" min="0" max="10" value="8" />
              </div>
              <div class="field">
                <label for="time-min">時間下限（分鐘）</label>
                <input id="time-min" type="number" min="0" step="0.5" value="3" />
              </div>
              <div class="field">
                <label for="time-max">時間上限（分鐘）</label>
                <input id="time-max" type="number" min="0" step="0.5" value="4" />
              </div>
            </div>
            <p>道具不列入評分。時間不足或超過，每半分鐘扣 2 分，不足半分鐘以半分鐘計。</p>
          </section>

          <section class="cloud-box" aria-label="雲端紀錄設定">
            <div class="field">
              <label for="cloud-endpoint">雲端紀錄位置</label>
              <input id="cloud-endpoint" type="url" placeholder="貼上 Google Apps Script Web App URL" />
            </div>
            <button id="save-cloud-btn" type="button">儲存位置</button>
            <p id="cloud-status">尚未設定雲端位置</p>
          </section>
        </section>

        <aside class="coach-panel" aria-label="教練分析">
          <nav class="tabs" aria-label="分析分頁">
            <button class="tab active" type="button" data-tab="live">即時觀察</button>
            <button class="tab" type="button" data-tab="report">展現分析</button>
            <button class="tab" type="button" data-tab="plan">練習處方</button>
          </nav>

          <section id="live-tab" class="tab-page active">
            <div class="score-meter">
              <span>評分總分</span>
              <strong id="readiness-score">--</strong>
            </div>
            <div class="signal-grid">
              <article>
                <span>語音</span>
                <strong id="face-signal">待觀察</strong>
                <p>聲音是否清楚，聲、韻、調是否穩定。</p>
              </article>
              <article>
                <span>內容</span>
                <strong id="posture-signal">待觀察</strong>
                <p>思想是否清楚，故事結構是否完整。</p>
              </article>
              <article>
                <span>儀態</span>
                <strong id="voice-signal">待觀察</strong>
                <p>動作、表情、站姿是否自然大方。</p>
              </article>
              <article>
                <span>時間</span>
                <strong id="story-signal">待觀察</strong>
                <p>不足或超過每半分鐘扣 2 分。</p>
              </article>
            </div>
            <ul id="live-cues" class="cue-list"></ul>
          </section>

          <section id="report-tab" class="tab-page">
            <h2>正式評分分析</h2>
            <div id="rubric-results" class="rubric-results"></div>
          </section>

          <section id="plan-tab" class="tab-page">
            <h2>練習處方</h2>
            <ol id="training-plan" class="training-plan"></ol>
            <h2 class="record-title">練習紀錄</h2>
            <div id="record-list" class="record-list"></div>
          </section>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
